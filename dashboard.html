<!DOCTYPE html>
<html>
<head>
    <title>Smart Garbage Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: #0f172a;
            color: white;
        }

        header {
            padding: 15px;
            background: #020617;
            text-align: center;
            font-size: 24px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
            padding: 15px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
        }

        .bin {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }

        .green { background: #16a34a; }
        .yellow { background: #facc15; color: black; }
        .red { background: #dc2626; }

        #map {
            height: 300px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>🚮 Smart Garbage Monitoring Dashboard</header>

<div class="container">

    <!-- LEFT SIDE -->
    <div>

        <div class="card">
            <h3>📦 Bin Status</h3>
            <div id="bins"></div>
        </div>

        <div class="card">
            <h3>🤖 AI Prediction</h3>
            <p id="prediction">Calculating...</p>
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div>

        <div class="card">
            <h3>📊 Live Data</h3>
            <canvas id="chart"></canvas>
        </div>

        <div class="card">
            <h3>🗺️ Map View</h3>
            <div id="map"></div>
        </div>

    </div>

</div>

<script>
/* MULTI BIN DATA */
let bins = [
    {name: "Bin A", level: 20, lat: 28.61, lng: 77.23},
    {name: "Bin B", level: 50, lat: 28.62, lng: 77.24},
    {name: "Bin C", level: 80, lat: 28.63, lng: 77.25}
];

/* DISPLAY BINS */
function updateBins(){
    let html = "";
    bins.forEach(bin => {
        let color = bin.level < 30 ? "green" :
                    bin.level < 70 ? "yellow" : "red";

        html += `<div class="bin ${color}">
                    ${bin.name}: ${Math.round(bin.level)}%
                 </div>`;
    });
    document.getElementById("bins").innerHTML = html;
}

/* AI PREDICTION */
function predict(){
    let critical = bins.filter(b => b.level > 70);

    if(critical.length > 0){
        document.getElementById("prediction").innerHTML =
        `⚠️ ${critical.length} bins need urgent collection!`;
    } else {
        document.getElementById("prediction").innerHTML =
        `✅ All bins under control`;
    }
}

/* CHART */
let ctx = document.getElementById("chart");
let chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Average Garbage Level",
            data: [],
            borderWidth: 2
        }]
    }
});

/* MAP */
let map = L.map('map').setView([28.61, 77.23], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let markers = [];

function updateMap(){
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    bins.forEach(bin => {
        let marker = L.marker([bin.lat, bin.lng])
            .addTo(map)
            .bindPopup(`${bin.name}: ${Math.round(bin.level)}%`);
        markers.push(marker);
    });
}

/* SIMULATION */
setInterval(() => {

    bins.forEach(bin => {
        bin.level += Math.random() * 10;
        if(bin.level > 100) bin.level = 10;
    });

    updateBins();
    predict();
    updateMap();

    let avg = bins.reduce((a,b)=>a+b.level,0)/bins.length;

    chart.data.labels.push("");
    chart.data.datasets[0].data.push(avg);

    if(chart.data.labels.length > 10){
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();

}, 2000);

/* INIT */
updateBins();
updateMap();
predict();

</script>

</body>
</html>
